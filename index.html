<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Educare</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/supabase-client.js"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-xl w-96">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-violet-700">EDUCARE</h1>
            <p class="text-gray-500 text-sm">School Management System</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="username" placeholder="Username" class="w-full border border-gray-300 rounded px-3 py-2">
            <div class="relative">
                <input type="password" id="password" placeholder="Password" class="w-full border border-gray-300 rounded px-3 py-2 pr-10">
                <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                    <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                    </svg>
                </button>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" id="remember-me" class="mr-2 rounded border-gray-300 text-violet-600 focus:ring-violet-500">
                    <span class="text-sm text-gray-600">Remember Me</span>
                </label>
                <button onclick="handleForgotPassword()" class="text-sm text-violet-600 hover:underline">Forgot Password?</button>
            </div>

            <button onclick="handleLogin()" class="w-full bg-violet-600 text-white font-bold py-2 rounded hover:bg-violet-700 transition">
                Login
            </button>
            <p id="error-msg" class="text-red-500 text-sm text-center mt-4 hidden"></p>
        </div>
    </div>

    <!-- Password Reset Modal -->
    <div id="reset-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
            <div class="bg-gradient-to-r from-violet-900 to-indigo-800 px-8 py-6 flex justify-between items-center text-white">
                <h3 class="font-black text-xl uppercase tracking-tight">Reset Password</h3>
                <button onclick="closeResetModal()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all hover:rotate-90">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Step 1: Request Token -->
            <div id="reset-step-1" class="p-8 space-y-4">
                <p class="text-sm text-gray-500">Enter your username to receive a reset token.</p>
                <input type="text" id="reset-username" placeholder="Enter Username" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-violet-500 outline-none">
                <button onclick="requestResetToken()" id="btn-request-token" class="w-full bg-violet-600 text-white font-bold py-3 rounded-xl hover:bg-violet-700 transition shadow-lg shadow-violet-200">
                    Get Reset Token
                </button>
                <div class="text-center pt-2">
                    <button onclick="showResetStep(2)" class="text-xs text-violet-600 font-bold hover:underline">I already have a token</button>
                </div>
            </div>

            <!-- Step 2: Submit Token -->
            <div id="reset-step-2" class="p-8 space-y-4 hidden">
                <p class="text-sm text-gray-500">Enter the token and your new password.</p>
                <input type="text" id="reset-token" placeholder="Enter 6-Digit Token" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-violet-500 outline-none font-mono tracking-widest text-center uppercase">
                <input type="password" id="reset-new-pass" placeholder="New Password" class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-violet-500 outline-none">
                <button onclick="submitResetPassword()" id="btn-submit-reset" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 transition shadow-lg shadow-emerald-200">
                    Update Password
                </button>
                <button onclick="showResetStep(1)" class="w-full text-gray-500 text-sm font-medium hover:text-gray-700">Back</button>
            </div>
        </div>
    </div>

    <script>
        // Auto-redirect if session exists
        const existingSession = localStorage.getItem('educare_user') || sessionStorage.getItem('educare_user');
        if (existingSession) {
            const user = JSON.parse(existingSession);
            if (user.role === 'admins') window.location.href = 'admin/admin-dashboard.html';
            else if (user.role === 'teachers') window.location.href = 'teacher/teacher-dashboard.html';
            else if (user.role === 'clinic_staff') window.location.href = 'clinic/clinic-dashboard.html';
            else if (user.role === 'guards') window.location.href = 'guard/guard-dashboard.html';
            else if (user.role === 'parents') window.location.href = 'parent/parent-dashboard.html';
        }

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember-me').checked;
            const errorMsg = document.getElementById('error-msg');
 
            if (!username || !password) {
                errorMsg.innerText = "Please enter both username and password.";
                errorMsg.classList.remove('hidden');
                return;
            }
            
            errorMsg.classList.add('hidden');
 
            // Array of tables to check - XAMPP style direct queries
            // All use username column for simplicity
            const userRoles = [
                { table: 'admins', column: 'username', role: 'admins', redirect: 'admin/admin-dashboard.html' },
                { table: 'teachers', column: 'username', role: 'teachers', redirect: 'teacher/teacher-dashboard.html' },
                { table: 'parents', column: 'username', role: 'parents', redirect: 'parent/parent-dashboard.html' },
                { table: 'guards', column: 'username', role: 'guards', redirect: 'guard/guard-dashboard.html' },
                { table: 'clinic_staff', column: 'username', role: 'clinic_staff', redirect: 'clinic/clinic-dashboard.html' }
            ];
 
            try {
                // Loop through each table to find the user
                for (let role of userRoles) {
                    const { data: user, error } = await supabase
                        .from(role.table)
                        .select('*')
                        .eq(role.column, username)
                        .eq('password', password)
                        .eq('is_active', true)
                        .single();

                    // If we found a match!
                    if (user) {
                        // Add role to user object
                        user.role = role.role;
                        
                        // Save session to localStorage or sessionStorage
                        const storage = rememberMe ? localStorage : sessionStorage;
                        storage.setItem('educare_user', JSON.stringify(user));
                        
                        // Redirect to dashboard
                        window.location.href = role.redirect;
                        return;
                    }
                }

                // If loop finishes and no match found
                throw new Error("Invalid credentials or inactive account.");
 
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
            }
        }

        // --- PASSWORD RESET LOGIC (Database-based) ---
        // Uses password_resets table in Supabase
        // Admin can view/manage requests in admin-settings.html

        function handleForgotPassword() {
            document.getElementById('reset-modal').classList.remove('hidden');
            showResetStep(1);
        }

        function closeResetModal() {
            document.getElementById('reset-modal').classList.add('hidden');
            document.getElementById('reset-username').value = '';
            document.getElementById('reset-token').value = '';
            document.getElementById('reset-new-pass').value = '';
        }

        function showResetStep(step) {
            document.getElementById('reset-step-1').classList.toggle('hidden', step !== 1);
            document.getElementById('reset-step-2').classList.toggle('hidden', step !== 2);
        }

        async function requestResetToken() {
            const username = document.getElementById('reset-username').value.trim();
            const btn = document.getElementById('btn-request-token');
            
            if (!username) return alert("Please enter your username.");
            
            btn.disabled = true;
            btn.innerText = "Verifying...";

            try {
                // 1. Find user across all tables - use username for all
                const roles = [
                    { table: 'admins', column: 'username' },
                    { table: 'teachers', column: 'username' },
                    { table: 'parents', column: 'username' },
                    { table: 'guards', column: 'username' },
                    { table: 'clinic_staff', column: 'username' }
                ];
                
                let foundRole = null;
                
                for (const r of roles) {
                    const { data } = await supabase.from(r.table).select('id').eq(r.column, username).maybeSingle();
                    if (data) { foundRole = r.table; break; }
                }

                if (!foundRole) throw new Error("Username not found.");

                // 2. Generate Token
                const token = Math.random().toString(36).substring(2, 8).toUpperCase();
                
                // 3. Store token in database (for admin tracking)
                const expiresAt = new Date(Date.now() + 3600000).toISOString(); // 1 hour
                const { error: insertError } = await supabase.from('password_resets').insert({
                    username: username,
                    user_role: foundRole,
                    token: token,
                    status: 'pending',
                    expires_at: expiresAt
                });

                if (insertError) {
                    console.error('Failed to record reset request:', insertError);
                    // Continue anyway - the token is still valid for the user
                }

                // 4. Show token to user
                alert(`Your reset token is: ${token}\n\n(In production, this would be sent to your email)\n\nAn admin will review your request.`);
                
                showResetStep(2);

            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Get Reset Token";
            }
        }

        async function submitResetPassword() {
            const token = document.getElementById('reset-token').value.trim().toUpperCase();
            const username = document.getElementById('reset-username').value.trim();
            const newPass = document.getElementById('reset-new-pass').value;
            const btn = document.getElementById('btn-submit-reset');

            if (!token || !newPass) return alert("All fields are required.");
            if (newPass.length < 6) return alert("Password must be at least 6 characters.");

            btn.disabled = true;
            btn.innerText = "Updating...";

            try {
                // 1. Verify Token from database
                const { data: resetRecord, error: fetchError } = await supabase
                    .from('password_resets')
                    .select('*')
                    .eq('token', token)
                    .eq('username', username)
                    .eq('status', 'pending')
                    .gte('expires_at', new Date().toISOString())
                    .order('created_at', { ascending: false })
                    .limit(1)
                    .single();

                if (fetchError || !resetRecord) throw new Error("Invalid or expired token. Please start over.");

                // 2. Update User Password
                const { error: updateError } = await supabase
                    .from(resetRecord.user_role)
                    .update({ password: newPass })
                    .eq('username', resetRecord.username);

                if (updateError) throw updateError;

                // 3. Mark reset request as completed
                const { error: completeError } = await supabase
                    .from('password_resets')
                    .update({ 
                        status: 'completed',
                        new_password: newPass,
                        resolved_at: new Date().toISOString()
                    })
                    .eq('id', resetRecord.id);

                if (completeError) console.error('Failed to update reset status:', completeError);

                alert("Password updated successfully! You can now login.");
                closeResetModal();

            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Update Password";
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const eyeOffIcon = document.getElementById('eye-off-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
