<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Calendar - Parent Portal</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../assets/supabase-client.js"></script>
    <script src="../core/general-core.js"></script>
    <script src="parent-utils.js"></script>
    <script src="parent-core.js" defer></script>
    <script src="parent-calendar.js" defer></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .nav-item { color: #6b7280; background: transparent; }
        .nav-item:hover { color: #16a34a; background: #f0fdf4; }
        .nav-item.active { color: #16a34a; background: #dcfce7; }
        
        /* Calendar grid */
        .calendar-day {
            min-height: 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 4px;
            font-size: 12px;
        }
        .calendar-day.empty {
            background: transparent;
        }
        .calendar-day.today {
            background: #dcfce7;
            font-weight: bold;
        }
        .calendar-day.school-day {
            background: #f0fdf4;
        }
        .calendar-day.holiday {
            background: #fef2f2;
            border: 1px solid #fecaca;
        }
        .calendar-day.event {
            background: #fefce8;
            border: 1px solid #fef08a;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 via-white to-green-50 min-h-screen flex flex-col">

    <!-- Header with Top Navigation -->
    <header class="bg-white/95 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
        <!-- Main Header Row -->
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <button onclick="navigateTo('dashboard')" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div>
                    <h1 class="font-bold text-lg text-gray-900">School Calendar</h1>
                    <p class="text-xs text-gray-500">View holidays and events</p>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4">
        <div class="max-w-md mx-auto w-full">
            
            <!-- Month Navigation -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">
                <div class="flex items-center justify-between">
                    <button onclick="prevMonth()" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <h2 id="current-month-year" class="font-bold text-lg text-gray-800">March 2026</h2>
                    <button onclick="nextMonth()" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
            
            <!-- Calendar Grid -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-4">
                <!-- Day Headers -->
                <div class="grid grid-cols-7 bg-gray-50 border-b">
                    <div class="py-2 text-center text-xs font-medium text-gray-500">Mon</div>
                    <div class="py-2 text-center text-xs font-medium text-gray-500">Tue</div>
                    <div class="py-2 text-center text-xs font-medium text-gray-500">Wed</div>
                    <div class="py-2 text-center text-xs font-medium text-gray-500">Thu</div>
                    <div class="py-2 text-center text-xs font-medium text-gray-500">Fri</div>
                    <div class="py-2 text-center text-xs font-medium text-gray-500">Sat</div>
                    <div class="py-2 text-center text-xs font-medium text-gray-500">Sun</div>
                </div>
                <!-- Calendar Days -->
                <div id="calendar-grid" class="grid grid-cols-7">
                    <!-- Days will be populated by JavaScript -->
                    <div class="flex justify-center py-12 col-span-7">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-green-600"></div>
                    </div>
                </div>
            </div>
            
            <!-- Legend -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-4">
                <h3 class="font-medium text-gray-700 mb-3">Legend</h3>
                <div class="flex flex-wrap gap-4">
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 rounded bg-green-100 border border-green-200"></div>
                        <span class="text-xs text-gray-600">School Day</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 rounded bg-yellow-100 border border-yellow-200"></div>
                        <span class="text-xs text-gray-600">Event</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-4 h-4 rounded bg-red-100 border border-red-200"></div>
                        <span class="text-xs text-gray-600">Holiday</span>
                    </div>
                </div>
            </div>
            
            <!-- Upcoming Events -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                <h3 class="font-medium text-gray-700 mb-3">Upcoming Events</h3>
                <div id="upcoming-events" class="space-y-2">
                    <div class="flex justify-center py-4">
                        <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-green-600"></div>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

</body>
</html>

<script>
    /**
     * Set active navigation item
     */
    function setActiveNav() {
        const navItems = ['dashboard', 'children', 'calendar', 'announcements', 'excuse', 'schedule'];
        navItems.forEach(item => {
            const navEl = document.getElementById('nav-' + item);
            if (navEl) {
                if (item === 'calendar') {
                    navEl.classList.add('active');
                } else {
                    navEl.classList.remove('active');
                }
            }
        });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        setActiveNav();
    });
</script>
