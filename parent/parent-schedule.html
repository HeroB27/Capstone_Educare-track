<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Schedule - Parent Portal</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../assets/supabase-client.js"></script>
    <script src="../core/general-core.js"></script>
    <script src="parent-core.js" defer></script>
    <script src="parent-schedule.js" defer></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .nav-item { color: #6b7280; background: transparent; }
        .nav-item:hover { color: #16a34a; background: #f0fdf4; }
        .nav-item.active { color: #16a34a; background: #dcfce7; }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 via-white to-green-50 min-h-screen flex flex-col">

    <!-- Header with Top Navigation -->
    <header class="bg-white/95 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
        <!-- Main Header Row -->
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <a href="parent-dashboard.html" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </a>
                <h1 class="font-bold text-lg text-gray-900">Class Schedule</h1>
            </div>
        </div>
        
        <!-- Top Navigation Bar -->
        <nav class="flex items-center gap-1 px-4 pb-3 overflow-x-auto scrollbar-hide">
            <button onclick="navigateTo('dashboard')" id="nav-dashboard" class="nav-item flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all">
                Home
            </button>
            <button onclick="navigateTo('children')" id="nav-children" class="nav-item flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all">
                My Children
            </button>
            <button onclick="navigateTo('announcements')" id="nav-announcements" class="nav-item flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all">
                Announcements
            </button>
            <button onclick="navigateTo('excuse')" id="nav-excuse" class="nav-item flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all">
                Excuse Letters
            </button>
            <button onclick="navigateTo('schedule')" id="nav-schedule" class="nav-item flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all">
                Schedule
            </button>
            <button onclick="navigateTo('calendar')" id="nav-calendar" class="nav-item flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all">
                Calendar
            </button>
        </nav>
    </header>

    <main class="flex-1 overflow-y-auto p-4">
        <div class="max-w-md mx-auto w-full">
            <div id="child-switcher" class="mb-4">
                <!-- Child switcher from parent-core.js -->
            </div>
            <div id="schedule-container" class="space-y-3">
                <div class="flex justify-center py-12">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-green-600"></div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
    });
</script>
