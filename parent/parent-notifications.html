<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal - Notifications - Educare</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d' }
                    }
                }
            }
        }
    </script>
    <script src="../assets/supabase-client.js"></script>
    <script src="../core/general-core.js"></script>
</head>
<body class="bg-gray-50 font-sans flex flex-col h-screen">

    <!-- Header with Top Navigation -->
    <header class="bg-white/95 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
        <!-- Main Header Row -->
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <button onclick="navigateTo('dashboard')" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="font-bold text-lg text-gray-800">Notifications</h1>
            </div>
            <button onclick="markAllRead()" class="p-2 bg-green-50 hover:bg-green-100 rounded-xl transition-colors">
                <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </button>
        </div>
        
        <!-- Top Navigation Bar -->
        <nav class="flex items-center gap-1 px-4 pb-3 overflow-x-auto scrollbar-hide">
            <button onclick="navigateTo('dashboard')" id="nav-dashboard" class="nav-item flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all">
                Home
            </button>
            <button onclick="navigateTo('children')" id="nav-children" class="nav-item flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all">
                My Children
            </button>
            <button onclick="navigateTo('announcements')" id="nav-announcements" class="nav-item flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all">
                Announcements
            </button>
            <button onclick="navigateTo('excuse')" id="nav-excuse" class="nav-item flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all">
                Excuse Letters
            </button>
            <button onclick="navigateTo('schedule')" id="nav-schedule" class="nav-item flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all">
                Schedule
            </button>
        </nav>
    </header>
    
    <style>
        .nav-item { color: #6b7280; background: transparent; }
        .nav-item:hover { color: #16a34a; background: #f0fdf4; }
        .nav-item.active { color: #16a34a; background: #dcfce7; }
    </style>

    <main class="flex-1 overflow-auto p-4 max-w-md mx-auto w-full">
        
        <!-- Filter Tabs -->
        <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
            <button onclick="filterNotifications('all')" data-filter="all" class="filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-primary-500 text-white whitespace-nowrap transition-all duration-200" id="tab-all">All</button>
            <button onclick="filterNotifications('gate')" data-filter="gate" class="filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-600 border border-gray-200 whitespace-nowrap transition-all duration-200" id="tab-gate">🚪 Gate</button>
            <button onclick="filterNotifications('clinic')" data-filter="clinic" class="filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-600 border border-gray-200 whitespace-nowrap transition-all duration-200" id="tab-clinic">🏥 Clinic</button>
            <button onclick="filterNotifications('excuse')" data-filter="excuse" class="filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-600 border border-gray-200 whitespace-nowrap transition-all duration-200" id="tab-excuse">📝 Excuse</button>
            <button onclick="filterNotifications('announcement')" data-filter="announcement" class="filter-btn px-4 py-2 rounded-xl text-sm font-medium bg-white text-gray-600 border border-gray-200 whitespace-nowrap transition-all duration-200" id="tab-announcement">📢 News</button>
        </div>

        <!-- Loading State -->
        <div id="loading-indicator" class="flex justify-center py-12">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary-500"></div>
        </div>

        <!-- Notifications List -->
        <div id="notifications-list" class="space-y-3 hidden">
            <!-- Notifications populated by JS -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden">
            <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-8 border border-gray-200/50 text-center">
                <div class="w-16 h-16 bg-primary-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-2">No Notifications</h3>
                <p class="text-sm text-gray-500">You're all caught up!</p>
            </div>
        </div>

    </main>

    <!-- Notification Detail Modal -->
    <div id="notification-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            <div class="bg-gradient-to-r from-emerald-600 to-emerald-500 px-8 py-6 flex justify-between items-center text-white shrink-0">
                <div class="flex items-center gap-3">
                    <span id="modal-icon" class="text-2xl">🔔</span>
                    <div>
                        <h3 id="modal-title" class="font-black text-xl uppercase tracking-tight">Notification</h3>
                        <p id="modal-time" class="text-emerald-100 text-xs">--</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all hover:rotate-90">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-8 overflow-y-auto custom-scrollbar flex-1">
                <div id="modal-message" class="text-gray-600 mb-6 font-medium">
                    <!-- Message content -->
                </div>
                <button onclick="closeModal()" class="w-full py-3 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors">Close</button>
            </div>
        </div>
    </div>

    <script src="parent-core.js"></script>
    <script src="parent-notifications.js"></script>
</body>
</html>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
    });
</script>
