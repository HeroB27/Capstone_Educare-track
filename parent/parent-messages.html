<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal - Messages - Educare</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/supabase-client.js"></script>
    <script src="../core/general-core.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .message-card { transition: all 0.2s ease; }
        .message-card:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -12px rgba(0, 0, 0, 0.15); }
        .urgent-pulse { animation: subtlePulse 1.2s infinite; }
        @keyframes subtlePulse { 0% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.7; transform: scale(1); } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .filter-btn { transition: all 0.2s ease; }
        .filter-btn.active { background: #16a34a; color: white; }
    </style>
</head>
<body class="flex flex-col h-screen bg-gray-50">
    <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
        <div class="flex items-center justify-between px-4 py-3 max-w-md mx-auto">
            <div class="flex items-center gap-3">
                <button onclick="navigateToDashboard()" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                    <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="font-bold text-lg text-gray-800">Messages</h1>
            </div>
            <div class="flex items-center gap-2">
                <span id="unread-badge" class="bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded-full hidden">0</span>
                <button onclick="markAllRead()" class="p-2 bg-green-50 hover:bg-green-100 rounded-xl transition-colors" title="Mark all as read">
                    <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </button>
                <button onclick="logoutParent()" class="p-2 bg-red-50 hover:bg-red-100 rounded-xl transition-colors">
                    <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-auto p-4 max-w-md mx-auto w-full pb-20">
        <div class="mb-4">
            <h2 id="parent-name" class="text-xl font-bold text-gray-800">Welcome, Parent</h2>
            <p class="text-sm text-gray-500">Gate alerts, clinic updates & school messages</p>
        </div>

        <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
            <button onclick="setFilter('all')" data-filter="all" class="filter-btn px-4 py-2 rounded-xl text-sm font-bold bg-emerald-600 text-white whitespace-nowrap" id="filter-all">All</button>
            <button onclick="setFilter('announcement')" data-filter="announcement" class="filter-btn px-4 py-2 rounded-xl text-sm font-bold bg-white text-gray-600 border border-gray-200 whitespace-nowrap" id="filter-announcement">📢 Announcements</button>
            <button onclick="setFilter('gate')" data-filter="gate" class="filter-btn px-4 py-2 rounded-xl text-sm font-bold bg-white text-gray-600 border border-gray-200 whitespace-nowrap" id="filter-gate">Gate</button>
            <button onclick="setFilter('clinic')" data-filter="clinic" class="filter-btn px-4 py-2 rounded-xl text-sm font-bold bg-white text-gray-600 border border-gray-200 whitespace-nowrap" id="filter-clinic">Clinic</button>
            <button onclick="setFilter('excuse')" data-filter="excuse" class="filter-btn px-4 py-2 rounded-xl text-sm font-bold bg-white text-gray-600 border border-gray-200 whitespace-nowrap" id="filter-excuse">Excuse</button>
            <button onclick="setFilter('unread')" data-filter="unread" class="filter-btn px-4 py-2 rounded-xl text-sm font-bold bg-white text-gray-600 border border-gray-200 whitespace-nowrap" id="filter-unread">Unread</button>
            <button onclick="setFilter('urgent')" data-filter="urgent" class="filter-btn px-4 py-2 rounded-xl text-sm font-bold bg-white text-gray-600 border border-gray-200 whitespace-nowrap" id="filter-urgent">Urgent</button>
        </div>

        <div id="loading-indicator" class="flex justify-center py-12">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-500"></div>
        </div>

        <div id="messages-container" class="space-y-3 hidden"></div>

        <div id="empty-state" class="hidden">
            <div class="bg-white/80 backdrop-blur-xl rounded-2xl p-8 border border-gray-200/50 text-center">
                <div class="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-2">No Messages</h3>
                <p class="text-sm text-gray-500">You're all caught up!</p>
            </div>
        </div>
    </main>

    <nav class="h-16 bg-white/80 backdrop-blur-xl border-t border-gray-200 fixed bottom-0 w-full max-w-md z-20 flex justify-around items-center text-xs">
        <button onclick="navigateTo('dashboard')" class="nav-item flex flex-col items-center justify-center py-2 rounded-xl w-16 gap-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span>Home</span>
        </button>
        <button onclick="navigateTo('attendance')" class="nav-item flex flex-col items-center justify-center py-2 rounded-xl w-16 gap-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <span>Attendance</span>
        </button>
        <button onclick="navigateTo('messages')" class="nav-item flex flex-col items-center justify-center py-2 rounded-xl w-16 gap-1 bg-emerald-50">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
            </svg>
            <span>Messages</span>
        </button>
        <button onclick="navigateTo('children')" class="nav-item flex flex-col items-center justify-center py-2 rounded-xl w-16 gap-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <span>Children</span>
        </button>
    </nav>

    <div id="message-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            <div class="bg-gradient-to-r from-emerald-600 to-emerald-500 px-6 py-5 flex justify-between items-center text-white shrink-0">
                <div class="flex items-center gap-2">
                    <span id="modal-icon" class="text-xl">🔔</span>
                    <h3 id="modal-title" class="font-black text-xl uppercase tracking-tight">Message</h3>
                </div>
                <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all hover:rotate-90">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 custom-scrollbar">
                <div class="flex items-center gap-2 text-sm text-gray-500 mb-4">
                    <span id="modal-date">--</span>
                    <span class="text-gray-300">|</span>
                    <span id="modal-sender">--</span>
                </div>
                <div id="modal-content" class="text-gray-700 whitespace-pre-wrap break-words"></div>
            </div>
            <div class="px-6 py-4 bg-gray-50 border-t shrink-0">
                <button onclick="closeModal()" class="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition-colors">Got It</button>
            </div>
        </div>
    </div>

    <script>
        let supabaseClient = null;
        let currentParent = null;
        let allMessages = [];
        let currentFilter = 'all';
        let readMessageIds = new Set();
        let myChildrenNames = [];

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function formatRelativeTime(dateStr) {
            if (!dateStr) return 'Unknown';
            try {
                const date = new Date(dateStr);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);
                if (diffMins < 1) return 'Just now';
                if (diffMins < 60) return `${diffMins}m ago`;
                if (diffHours < 24) return `${diffHours}h ago`;
                if (diffDays < 7) return `${diffDays}d ago`;
                return date.toLocaleDateString('en-PH', { month: 'short', day: 'numeric' });
            } catch(e) { return 'Recent'; }
        }

        async function loadReadStatuses() {
            if (!currentParent) return;
            try {
                const storageKey = `parent_read_messages_${currentParent.id}`;
                const stored = localStorage.getItem(storageKey);
                if (stored) {
                    readMessageIds.clear();
                    JSON.parse(stored).forEach(id => readMessageIds.add(id));
                } else {
                    readMessageIds.clear();
                }
            } catch (err) {
                console.warn('Could not load read statuses:', err);
            }
        }

        function persistReadMessages() {
            if (!currentParent) return;
            const storageKey = `parent_read_messages_${currentParent.id}`;
            localStorage.setItem(storageKey, JSON.stringify([...readMessageIds]));
        }

        async function loadMyChildrenInfo() {
            if (!currentParent) return;
            try {
                const { data: children } = await supabaseClient
                    .from('students')
                    .select('id, full_name')
                    .eq('parent_id', currentParent.id);
                myChildrenNames = (children || []).map(c => c.full_name);
            } catch (err) {
                console.error('Error loading children:', err);
            }
        }

        async function fetchMessages() {
            if (!supabaseClient || !currentParent) return [];
            
            await loadMyChildrenInfo();
            const now = new Date().toISOString();
            let messages = [];

            // 1. Fetch admin announcements targeting parents or students
            const { data: announcements, error: annErr } = await supabaseClient
                .from('announcements')
                .select('id, title, content, created_at, type, priority, target_parents, target_students, posted_by_admin_id, admins(full_name), image_url')
                .or('target_parents.eq.true,target_students.eq.true')
                .order('created_at', { ascending: false })
                .limit(30);
            
            if (annErr) console.error('Announcements error:', annErr);
            
            // Filter out scheduled future announcements and format
            const formattedAnnouncements = (announcements || [])
                .filter(ann => !ann.scheduled_at || ann.scheduled_at <= now)
                .map(ann => ({
                    id: ann.id,
                    title: ann.title || 'Announcement',
                    content: ann.content || '',
                    createdAt: ann.created_at,
                    category: 'announcement',
                    icon: '📢',
                    sender: ann.admins?.full_name || 'Administrator',
                    isUrgent: (ann.priority || '').toLowerCase() === 'high',
                    imageUrl: ann.image_url,
                    read: readMessageIds.has(`ann_${ann.id}`)
                }));
            
            messages = [...formattedAnnouncements];

            // 2. Fetch notifications (gate, clinic, excuse)
            const { data: notifs, error: notifErr } = await supabaseClient
                .from('notifications')
                .select('id, title, message, created_at, type, sender_id, is_urgent')
                .eq('recipient_id', currentParent.id)
                .order('created_at', { ascending: false });
            
            if (notifErr) console.error('Notifications error:', notifErr);

            // Filter: only show gate, clinic, excuse messages + teacher messages about my children
            const filteredNotifs = (notifs || []).filter(notif => {
                const type = (notif.type || '').toLowerCase();
                const message = (notif.message || '').toLowerCase();
                const title = (notif.title || '').toLowerCase();
                
                // Include: gate, clinic, excuse types
                if (['gate', 'clinic', 'excuse'].some(t => type.includes(t))) return true;
                // Include: messages mentioning my children
                return myChildrenNames.some(name => message.includes(name.toLowerCase()) || title.includes(name.toLowerCase()));
            });

            // Get sender names
            let senderNames = new Map();
            const senderIds = [...new Set(filteredNotifs.map(n => n.sender_id).filter(id => id))];
            if (senderIds.length) {
                const { data: teachers } = await supabaseClient.from('teachers').select('id, full_name').in('id', senderIds);
                if (teachers) teachers.forEach(t => senderNames.set(t.id, t.full_name));
            }

            const formattedNotifs = filteredNotifs.map(n => {
                const type = (n.type || '').toLowerCase();
                let category = 'other';
                let icon = '📢';
                if (type.includes('gate')) { category = 'gate'; icon = '🚪'; }
                else if (type.includes('clinic') || type.includes('health')) { category = 'clinic'; icon = '🏥'; }
                else if (type.includes('excuse')) { category = 'excuse'; icon = '📝'; }
                
                return {
                    id: n.id,
                    title: n.title || 'Notification',
                    content: n.message || '',
                    createdAt: n.created_at,
                    category,
                    icon,
                    sender: senderNames.get(n.sender_id) || 'School',
                    isUrgent: n.is_urgent === true,
                    read: readMessageIds.has(n.id)
                };
            });

            messages = [...messages, ...formattedNotifs];
            messages.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            return messages;
        }

        function classifyCategory(msg) {
            const type = (msg.type || '').toLowerCase();
            const title = (msg.title || '').toLowerCase();
            const content = (msg.content || '').toLowerCase();
            
            if (type.includes('gate') || title.includes('gate') || content.includes('gate pass')) return 'gate';
            if (type.includes('clinic') || type.includes('health') || title.includes('clinic') || content.includes('clinic')) return 'clinic';
            if (type.includes('excuse') || title.includes('excuse') || content.includes('excuse')) return 'excuse';
            return 'other';
        }

        function renderMessages(messages) {
            const container = document.getElementById('messages-container');
            const emptyDiv = document.getElementById('empty-state');
            const loadingDiv = document.getElementById('loading-indicator');
            
            let filtered = messages;
            if (currentFilter === 'unread') {
                filtered = messages.filter(m => !m.read);
            } else if (currentFilter === 'urgent') {
                filtered = messages.filter(m => m.isUrgent);
            } else if (currentFilter === 'announcement') {
                filtered = messages.filter(m => m.category === 'announcement');
            } else if (['gate', 'clinic', 'excuse'].includes(currentFilter)) {
                filtered = messages.filter(m => m.category === currentFilter);
            }
            
            if (filtered.length === 0) {
                container.classList.add('hidden');
                emptyDiv.classList.remove('hidden');
                loadingDiv.classList.add('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            emptyDiv.classList.add('hidden');
            loadingDiv.classList.add('hidden');
            
            container.innerHTML = filtered.map(msg => {
                const unreadClass = !msg.read ? 'border-l-4 border-l-emerald-500 bg-white' : 'border-l-4 border-l-gray-200 bg-gray-50/40';
                const urgentBadge = msg.isUrgent ? '<span class="urgent-pulse ml-2 bg-red-100 text-red-700 text-[9px] font-black px-2 py-1 rounded-full uppercase">⚠️ URGENT</span>' : '';
                const readBadge = !msg.read ? '<span class="bg-emerald-600 text-white text-[9px] font-bold px-2 py-0.5 rounded-full">New</span>' : '<span class="bg-gray-200 text-gray-600 text-[9px] font-bold px-2 py-0.5 rounded-full">✓ Read</span>';
                const imageHtml = msg.imageUrl ? `<img src="${msg.imageUrl}" class="mt-2 max-w-full h-auto rounded-lg border border-gray-200 max-h-24 object-contain">` : '';
                const categoryClass = msg.category === 'announcement' ? 'bg-violet-100 text-violet-700' : msg.category === 'gate' ? 'bg-amber-100 text-amber-700' : msg.category === 'clinic' ? 'bg-blue-100 text-blue-700' : msg.category === 'excuse' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-600';
                
                return `
                    <div class="message-card ${unreadClass} rounded-2xl shadow-sm hover:shadow-md overflow-hidden cursor-pointer" onclick="showDetail(${msg.id})">
                        <div class="p-4">
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex items-center gap-2">
                                    <span class="text-lg">${msg.icon}</span>
                                    <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-full ${categoryClass}">${msg.category}</span>
                                    ${urgentBadge}
                                    ${readBadge}
                                </div>
                                <span class="text-[10px] text-gray-400">${formatRelativeTime(msg.createdAt)}</span>
                            </div>
                            <h3 class="font-bold text-gray-800 text-base mb-1">${escapeHtml(msg.title)}</h3>
                            <p class="text-gray-600 text-xs line-clamp-2">${escapeHtml(msg.content.substring(0, 100))}${msg.content.length > 100 ? '...' : ''}</p>
                            ${imageHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateUnreadBadge(messages) {
            const unreadCount = messages.filter(m => !m.read).length;
            const badge = document.getElementById('unread-badge');
            if (badge) {
                if (unreadCount > 0) {
                    badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
        }

        async function refreshMessages() {
            if (!currentParent) return;
            try {
                document.getElementById('loading-indicator')?.classList.remove('hidden');
                document.getElementById('messages-container')?.classList.add('hidden');
                document.getElementById('empty-state')?.classList.add('hidden');
                
                await loadReadStatuses();
                const messages = await fetchMessages();
                allMessages = messages;
                renderMessages(allMessages);
                updateUnreadBadge(allMessages);
            } catch (err) {
                console.error('Refresh error:', err);
            } finally {
                document.getElementById('loading-indicator')?.classList.add('hidden');
            }
        }

        async function showDetail(id) {
            const msg = allMessages.find(m => m.id === id);
            if (!msg) return;
            
            if (!msg.read) {
                readMessageIds.add(id);
                persistReadMessages();
                msg.read = true;
                renderMessages(allMessages);
                updateUnreadBadge(allMessages);
            }
            
            const imageHtml = msg.imageUrl ? `<img src="${msg.imageUrl}" class="mt-4 mx-auto max-w-full h-auto rounded-lg border border-gray-200">` : '';
            document.getElementById('modal-icon').innerText = msg.icon;
            document.getElementById('modal-title').innerText = msg.title;
            document.getElementById('modal-date').innerText = new Date(msg.createdAt).toLocaleString('en-PH', { hour: '2-digit', minute: '2-digit', month: 'short', day: 'numeric', year: 'numeric' });
            document.getElementById('modal-sender').innerText = msg.sender;
            document.getElementById('modal-content').innerHTML = escapeHtml(msg.content).replace(/\n/g, '<br>') + imageHtml;
            document.getElementById('message-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('message-modal').classList.add('hidden');
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-600', 'text-white');
                btn.classList.add('bg-white', 'text-gray-600', 'border', 'border-gray-200');
            });
            const activeBtn = document.getElementById(`filter-${filter}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-white', 'text-gray-600', 'border', 'border-gray-200');
                activeBtn.classList.add('bg-emerald-600', 'text-white');
            }
            renderMessages(allMessages);
        }

        async function markAllRead() {
            allMessages.forEach(msg => {
                if (!msg.read) {
                    readMessageIds.add(msg.id);
                    msg.read = true;
                }
            });
            persistReadMessages();
            renderMessages(allMessages);
            updateUnreadBadge(allMessages);
        }

        function navigateTo(page) {
            if (page === 'dashboard') window.location.href = 'parent-dashboard.html';
            else if (page === 'attendance') window.location.href = 'parent-childs-attendance.html';
            else if (page === 'messages') window.location.href = 'parent-messages.html';
            else if (page === 'children') window.location.href = 'parent-children.html';
        }

        function navigateToDashboard() {
            window.location.href = 'parent-dashboard.html';
        }

        async function logoutParent() {
            if (supabaseClient) await supabaseClient.auth.signOut();
            localStorage.removeItem('parentUser');
            sessionStorage.clear();
            window.location.href = '../index.html';
        }

        async function init() {
            try {
                if (typeof window.supabase !== 'undefined') supabaseClient = window.supabase;
                else if (typeof supabase !== 'undefined') supabaseClient = supabase;
                
                let parent = null;
                if (typeof checkSession === 'function') {
                    parent = checkSession('parents');
                } else {
                    const cached = localStorage.getItem('parentUser');
                    if (cached) parent = JSON.parse(cached);
                }
                
                if (!parent && supabaseClient) {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (session?.user) {
                        const { data: p } = await supabaseClient.from('parents').select('id, full_name').eq('email', session.user.email).single();
                        if (p) parent = p;
                    }
                }
                
                if (!parent) {
                    window.location.href = '../index.html';
                    return;
                }
                
                currentParent = parent;
                document.getElementById('parent-name').innerText = `Welcome, ${parent.full_name?.split(' ')[0] || 'Parent'}`;
                
                await refreshMessages();
                setInterval(refreshMessages, 45000);
                
            } catch (err) {
                console.error('Init error:', err);
            }
        }

        window.showDetail = showDetail;
        window.closeModal = closeModal;
        window.setFilter = setFilter;
        window.markAllRead = markAllRead;
        window.navigateTo = navigateTo;
        window.navigateToDashboard = navigateToDashboard;
        window.logoutParent = logoutParent;

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
