<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal - Dashboard - Educare</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../assets/supabase-client.js"></script>
    <script src="../core/general-core.js"></script>
    <script src="parent-utils.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Pulse animation for live status */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 3px solid currentColor;
            animation: pulse-ring 1.5s ease-out infinite;
        }
        
        /* Hide scrollbar for horizontal scroll */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Top Navigation Styles */
        .nav-item {
            color: #6b7280;
            background: transparent;
        }
        .nav-item:hover {
            color: #16a34a;
            background: #f0fdf4;
        }
        .nav-item.active {
            color: #16a34a;
            background: #dcfce7;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 via-white to-green-50 min-h-screen flex flex-col">

    <!-- Header with Top Navigation -->
    <header class="bg-white/95 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
        <!-- Main Header Row -->
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <button onclick="navigateTo('children')" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                    <div class="h-10 w-10 rounded-xl bg-green-600 flex items-center justify-center text-white font-bold shadow-md" id="child-avatar-header">
                        ?
                    </div>
                </button>
                <div>
                    <h1 id="current-child-name" class="font-bold text-lg text-gray-900">Dashboard</h1>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <!-- Notification Bell -->
                <button onclick="navigateTo('notifications')" class="relative p-3 bg-white border border-gray-100 rounded-xl text-gray-500 hover:text-green-600 hover:border-green-200 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                    </svg>
                    <span id="notif-badge-quick-action" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full text-[10px] text-white flex items-center justify-center hidden">0</span>
                </button>
                <!-- Settings -->
                <a href="parent-settings.html" class="p-3 bg-white border border-gray-100 rounded-xl text-gray-500 hover:text-green-600 hover:border-green-200 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </a>
            </div>
    </header>

    <main class="flex-1 overflow-y-auto">
        <div class="max-w-md mx-auto w-full px-4 pt-4">
        
            <!-- Welcome Section -->
            <div class="mb-6">
                <h2 id="parent-name" class="text-2xl font-bold text-gray-800 mb-4">Welcome</h2>
                
                <!-- Instagram Stories Style Child Switcher -->
                <div id="child-switcher" class="flex gap-4 overflow-x-auto pb-2 scrollbar-hide">
                    <!-- Child switcher populated by parent-core.js -->
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading-indicator" class="flex justify-center py-12">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-green-600"></div>
            </div>

            <!-- Content (hidden until loaded) -->
            <div id="dashboard-content" class="hidden space-y-4">
                
                <!-- Today's Schedule Card -->
                <div class="bg-white rounded-3xl shadow-sm p-6 relative overflow-hidden border border-gray-100">
                    <!-- Decorative gradient -->
                    <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-green-100 to-transparent rounded-full -translate-y-1/2 translate-x-1/2"></div>
                    
                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h3 id="child-name" class="text-xl font-bold text-gray-800">--</h3>
                                <p id="child-class" class="text-sm text-gray-500">--</p>
                            </div>
                            <div class="w-10 h-10 bg-green-100 text-green-600 rounded-xl flex items-center justify-center shrink-0">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                        </div>
                        
                        <h4 class="font-bold text-gray-700 mb-3 text-xs uppercase tracking-wider">Today's Schedule</h4>
                        <div id="today-schedule-container" class="space-y-2 max-h-[280px] overflow-y-auto pr-1">
                            <!-- Schedule injected here -->
                        </div>
                    </div>
                </div>

                <!-- Attendance Summary Card -->
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
                    <h4 class="font-bold text-gray-700 mb-3">This Month's Attendance</h4>
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-4xl font-bold text-green-600" id="summary-percentage">--%</p>
                            <p class="text-xs text-gray-500">Attendance Rate</p>
                        </div>
                        <div id="summary-chart-container" class="w-20 h-20">
                            <canvas id="summary-pie-chart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Clinic Alert (shown when child is in clinic) -->
                <div id="clinic-alert" class="hidden bg-gradient-to-r from-red-50 to-red-100 border border-red-200 rounded-3xl p-6">
                    <div class="flex items-start gap-4">
                        <div class="relative flex-shrink-0">
                            <span class="text-3xl">🏥</span>
                            <span class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full animate-pulse"></span>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-red-800">In Clinic</h4>
                            <p id="clinic-reason" class="text-sm text-red-700 mt-1">--</p>
                            <p id="clinic-time" class="text-xs text-red-500 mt-2">--</p>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="navigateTo('excuse')" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 flex flex-col items-center gap-3 hover:shadow-lg transition-all duration-200 hover:-translate-y-0.5">
                        <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center">
                            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </div>
                        <span class="text-sm font-semibold text-gray-700">Submit Excuse</span>
                    </button>
                    <button onclick="navigateTo('attendance')" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 flex flex-col items-center gap-3 hover:shadow-lg transition-all duration-200 hover:-translate-y-0.5">
                        <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <span class="text-sm font-semibold text-gray-700">Attendance</span>
                    </button>
                    <button onclick="navigateTo('notifications')" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 flex flex-col items-center gap-3 hover:shadow-lg transition-all duration-200 hover:-translate-y-0.5">
                        <div class="w-12 h-12 bg-yellow-100 rounded-xl flex items-center justify-center relative">
                            <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                            </svg>
                    <span id="notif-badge-quick-action-2" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[10px] text-white flex items-center justify-center">0</span>
                        </div>
                        <span class="text-sm font-semibold text-gray-700">Alerts</span>
                    </button>
                    <button onclick="navigateTo('announcements')" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 flex flex-col items-center gap-3 hover:shadow-lg transition-all duration-200 hover:-translate-y-0.5">
                        <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center">
                            <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/>
                            </svg>
                        </div>
                        <span class="text-sm font-semibold text-gray-700">Updates</span>
                    </button>
                    <button onclick="navigateTo('schedule')" class="col-span-2 bg-white rounded-3xl shadow-sm border border-gray-100 p-6 flex items-center gap-4 hover:shadow-lg transition-all duration-200 hover:-translate-y-0.5">
                        <div class="w-12 h-12 bg-cyan-100 rounded-xl flex items-center justify-center">
                            <svg class="w-6 h-6 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2zM12 12h.01"/>
                            </svg>
                        </div>
                        <span class="text-lg font-semibold text-gray-700">View Class Schedule</span>
                    </button>
                </div>

                <!-- Clinic History Section -->
                <div class="mt-6">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-bold text-gray-700 text-lg">Clinic Visits</h3>
                        <button onclick="loadClinicHistory()" class="text-sm text-green-600 font-medium hover:text-green-700">View All →</button>
                    </div>
                    <div id="clinic-history" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-4 space-y-3">
                        <!-- Clinic history populated by JS -->
                        <div class="text-center py-6 text-gray-400">
                            <svg class="w-10 h-10 mx-auto mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                            </svg>
                            <p class="text-sm">Loading clinic history...</p>
                        </div>
                    </div>
                </div>

                <!-- Today's Activity Timeline -->
                <div class="mt-6">
                    <h3 class="font-bold text-gray-700 mb-3 text-lg">Today's Activity</h3>
                    <div id="activity-timeline" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-4 space-y-4">
                        <!-- Activity items populated by JS -->
                    </div>
                </div>

                <!-- Recent Notifications -->
                <div class="mt-6">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-bold text-gray-700 text-lg">Recent Alerts</h3>
                        <button onclick="navigateTo('notifications')" class="text-sm text-green-600 font-medium hover:text-green-700">View All →</button>
                    </div>
                    <div id="notifications-preview" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-4 space-y-3">
                        <!-- Notifications populated by JS -->
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="parent-core.js"></script>
    <script src="parent-dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
