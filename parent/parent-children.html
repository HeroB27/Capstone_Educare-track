<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Children - Parent Portal</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../assets/supabase-client.js"></script>
    <script src="../core/general-core.js"></script>
    <script src="parent-utils.js"></script>
    <script src="parent-core.js" defer></script>
    <script src="parent-children.js" defer></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Top Navigation Styles */
        .nav-item {
            color: #6b7280;
            background: transparent;
        }
        .nav-item:hover {
            color: #16a34a;
            background: #f0fdf4;
        }
        .nav-item.active {
            color: #16a34a;
            background: #dcfce7;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-green-50 via-white to-green-50 min-h-screen flex flex-col">

    <!-- Header with Top Navigation -->
    <header class="bg-white/95 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
        <!-- Main Header Row -->
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <button onclick="navigateTo('children')" class="p-2 hover:bg-gray-100 rounded-xl transition-colors">
                    <div class="h-10 w-10 rounded-xl bg-green-600 flex items-center justify-center text-white font-bold shadow-md">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    </div>
                </button>
                <div>
                    <h1 class="font-bold text-lg text-gray-900">My Children</h1>
                    <p class="text-xs text-gray-500">View and manage your children</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <!-- Notification Bell -->
                <button onclick="navigateTo('messages')" class="relative p-3 bg-white border border-gray-100 rounded-xl text-gray-500 hover:text-green-600 hover:border-green-200 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                    </svg>
                </button>
                <!-- Settings -->
                <a href="parent-settings.html" class="p-3 bg-white border border-gray-100 rounded-xl text-gray-500 hover:text-green-600 hover:border-green-200 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </a>
            </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4">
        <div id="loading-indicator" class="flex justify-center py-12">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-green-600"></div>
        </div>
        <div id="children-list" class="hidden space-y-4">
            <!-- Children cards will be populated here -->
        </div>
        <div id="empty-state" class="hidden text-center py-12">
            <p class="text-gray-500">No children linked to your account.</p>
        </div>
    </main>

    <!-- Child Detail Modal -->
    <div id="child-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            <div class="bg-gradient-to-r from-emerald-600 to-emerald-500 px-8 py-6 flex justify-between items-center text-white shrink-0">
                <h3 id="modal-child-name" class="font-black text-xl uppercase tracking-tight">Child Details</h3>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all hover:rotate-90">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div id="modal-content" class="p-8 overflow-y-auto flex-1">
                <!-- Details loaded here -->
            </div>
        </div>
    </div>

    <!-- Compare Children Modal -->
    <div id="compare-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            <div class="bg-gradient-to-r from-emerald-600 to-emerald-500 px-8 py-6 flex justify-between items-center text-white shrink-0">
                <h3 class="font-black text-xl uppercase tracking-tight">Compare Children</h3>
                <button onclick="closeCompareModal()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all hover:rotate-90">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div id="compare-content" class="p-8 overflow-y-auto flex-1">
                <!-- Comparison loaded here -->
            </div>
        </div>
    </div>

</body>
</html>

<script>
    /**
     * Set active navigation item
     */
    function setActiveNav() {
        const navItems = ['dashboard', 'children', 'announcements', 'excuse', 'schedule', 'calendar'];
        navItems.forEach(item => {
            const navEl = document.getElementById('nav-' + item);
            if (navEl) {
                if (item === 'children') {
                    navEl.classList.add('active');
                } else {
                    navEl.classList.remove('active');
                }
            }
        });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        setActiveNav();
    });
</script>
