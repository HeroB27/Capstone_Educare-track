<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homeroom Attendance - Teacher Portal</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/supabase-client.js"></script>
    <script src="../core/general-core.js"></script>
    <script src="teacher-core.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .status-square {
            width: 80px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 2px solid transparent;
        }
        .status-square:hover { transform: scale(0.97); filter: brightness(0.95); }
        .status-present { background-color: #ecfdf5; color: #047857; border-color: #10b981; }
        .status-late { background-color: #fffbeb; color: #b45309; border-color: #f59e0b; }
        .status-absent { background-color: #fef2f2; color: #b91c1c; border-color: #ef4444; }
        .status-excused { background-color: #eff6ff; color: #1d4ed8; border-color: #3b82f6; }
        .status-excused-absent { background-color: #f0fdfa; color: #0d9488; border-color: #14b8a6; }
        .status-empty { background-color: #f9fafb; color: #9ca3af; border-color: #d1d5db; }
        .locked-square { cursor: not-allowed; opacity: 0.7; }
        .locked-square:hover { transform: none; filter: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-blue-50 min-h-screen">

    <div class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-10">
        <div class="px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='teacher-dashboard.html'" class="p-2 rounded-xl hover:bg-gray-100 transition">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>
                <h1 class="text-xl font-bold text-gray-800">Homeroom Attendance</h1>
            </div>
            <div class="flex items-center gap-2">
                <span id="teacher-name" class="text-sm text-gray-600">Loading...</span>
                <div class="h-8 w-8 bg-gradient-to-br from-blue-400 to-blue-600 rounded-full flex items-center justify-center text-white text-xs font-bold">T</div>
            </div>
        </div>
    </div>

    <main class="p-6">
        <div class="bg-white rounded-2xl p-4 mb-6 flex flex-wrap gap-4 items-center justify-between border shadow-sm">
            <div class="flex gap-6">
                <div>
                    <span class="text-xs text-gray-500">Homeroom Class</span>
                    <p id="homeroom-class-info" class="font-bold text-gray-800">--</p>
                </div>
                <div>
                    <span class="text-xs text-gray-500">Total Students</span>
                    <p id="student-count" class="font-bold text-gray-800">0</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="save-attendance-btn" class="px-4 py-2 bg-green-600 text-white rounded-xl shadow hover:bg-green-700 transition flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> Save Changes
                </button>
                <button id="view-table-btn" class="px-4 py-2 bg-blue-600 text-white rounded-xl shadow hover:bg-blue-700 transition flex items-center gap-2">
                    <i data-lucide="table" class="w-4 h-4"></i> View Attendance Table
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl p-4 mb-6 flex items-center gap-4 border shadow-sm">
            <label class="font-bold text-gray-700">Date:</label>
            <input type="date" id="attendance-date" class="px-3 py-2 border rounded-xl">
        </div>

        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full min-w-[400px]">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-4 py-3 text-left sticky left-0 bg-gray-50 z-10 font-semibold text-gray-700 text-sm">Student Name</th>
                            <th class="px-4 py-3 text-left font-semibold text-gray-700 text-sm">Attendance</th>
                        </tr>
                    </thead>
                    <tbody id="checklist-tbody" class="divide-y divide-gray-100">
                        <tr><td colspan="2" class="text-center py-8">Loading students...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="teacher-homeroom.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
