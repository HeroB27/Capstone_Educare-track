            <div class="bg-white rounded-2xl shadow-lg p-6 mt-6">
                <h4 class="font-bold text-gray-800 mb-4">My Sent Announcements</h4>
                <div id="sent-announcements-list" class="space-y-3">
                    <div class="text-center text-gray-500 py-8">Loading...</div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-lg p-6 mt-6">
                <h4 class="font-bold text-gray-800 mb-4">My Sent Announcements</h4>
                <div id="sent-announcements-list" class="space-y-3">
                    <div class="text-center text-gray-500 py-8">Loading...</div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-lg p-6 mt-6">
                <h4 class="font-bold text-gray-800 mb-4">My Scheduled Announcements</h4>
                <div id="scheduled-announcements-list" class="space-y-3">
                    <div class="text-center text-gray-500 py-8">Loading...</div>
                </div>
            </div>
        `;

        // Content router
        function loadPageContent(page) {
            const content = document.getElementById('main-content');
            const title = document.getElementById('page-title');
            
            // Update active nav
            document.querySelectorAll('nav a').forEach(a => {
                a.classList.remove('bg-blue-800/50', 'border-white', 'text-white');
                a.classList.add('text-blue-200', 'hover:text-white');
            });
            const activeNav = document.getElementById('nav-' + page);
            if (activeNav) {
                activeNav.classList.add('bg-blue-800/50', 'border-white');
                activeNav.classList.remove('text-blue-200');
            }
            
            // Load content
            switch(page) {
                case 'dashboard':
                    content.innerHTML = dashboardContent;
                    title.innerText = 'Summary Board';
                    setTimeout(() => {
                        if (typeof initializeTeacherPortal === 'function') initializeTeacherPortal();
                        if (typeof loadSchedule === 'function') loadSchedule();
                    }, 100);
                    break;
                case 'homeroom':
                    content.innerHTML = homeroomContent;
                    title.innerText = 'Homeroom Class';
                    setTimeout(() => { if (typeof loadHomeroomStudents === 'function') loadHomeroomStudents(); }, 100);
                    break;
                case 'subject':
                    content.innerHTML = subjectContent;
                    title.innerText = 'Subject Attendance';
                    setTimeout(() => { if (typeof loadSubjectLoads === 'function') loadSubjectLoads(); }, 100);
                    break;
                case 'clinic':
                    content.innerHTML = clinicContent;
                    title.innerText = 'Clinic Pass';
                    setTimeout(() => { if (typeof loadClinicPassInterface === 'function') loadClinicPassInterface(); }, 100);
                    break;
                case 'excuse':
                    content.innerHTML = excuseContent;
                    title.innerText = 'Excuse Letter Approval';
                    setTimeout(() => { if (typeof loadExcuseLetters === 'function') loadExcuseLetters(); }, 100);
                    break;
                case 'analytics':
                    content.innerHTML = analyticsContent;
                    title.innerText = 'Analytics';
                    setTimeout(() => { if (typeof loadAnalytics === 'function') loadAnalytics(); }, 100);
                    break;
                case 'announcements':
                    content.innerHTML = announcementsContent;
                    title.innerText = 'Announcements';
                    setTimeout(() => { if (typeof setupAnnouncementPage === 'function') setupAnnouncementPage(); }, 100);
                    break;
                default:
                    content.innerHTML = dashboardContent;
                    title.innerText = 'Summary Board';
                    setTimeout(() => { if (typeof initializeTeacherPortal === 'function') initializeTeacherPortal(); }, 100);
            }
        }

        // Handle subject dropdown change
        function handleSubjectChange() {
            const subjectId = document.getElementById('subject-select').value;
            loadSubjectStudents(subjectId);
        }

        // Override navigateTo to use SPA-like behavior
        const originalNavigateTo = navigateTo;
        navigateTo = function(section) {
            loadPageContent(section);
        };

        // Initialize with dashboard
        document.addEventListener('DOMContentLoaded', () => {
            loadPageContent('dashboard');
        });

        // Load Dashboard Stats - Updated Status Definitions
        async function loadAdviserDashboardStats() {
            try {
                // FIX 1: Timezone adjustment for morning defenses
                const localDate = new Date();
                localDate.setMinutes(localDate.getMinutes() - localDate.getTimezoneOffset());
                const today = localDate.toISOString().split('T')[0];

                let present = 0, late = 0, absent = 0, excused = 0, inClinic = 0, pendingCount = 0;
                let studentIds = [];

                // Only fetch homeroom students if the teacher has an advisory class
                if (homeroomClass && homeroomClass.id) {
                    const { data: students } = await supabase
                        .from('students')
                        .select('id')
                        .eq('class_id', homeroomClass.id);
                    
                    if (students && students.length > 0) {
                        studentIds = students.map(s => s.id);
                    }
                }

                // If they have homeroom students, get their attendance and excuses
                if (studentIds.length > 0) {
                    // FIX: Get all attendance logs and group by student to get the LATEST status
                    const { data: attLogs } = await supabase
                        .from('attendance_logs')
                        .select('student_id, status')
                        .eq('log_date', today)
                        .in('student_id', studentIds);

                    if (attLogs && attLogs.length > 0) {
                        // Group by student to get the LATEST status (protecting against double scans)
                        const latestStatus = {};
                        attLogs.forEach(log => {
                            latestStatus[log.student_id] = log.status; // Overwrites older ones naturally
                        });

                        Object.values(latestStatus).forEach(status => {
                            if (status === 'On Time') present++;
                            if (status === 'Late') late++;
                            if (status === 'Excused') excused++;
                        });

                        // Calculate absent: students with no scan are absent
                        absent = studentIds.length - present - late - excused;
                    }

                    const { data: pendingExcuses } = await supabase
                        .from('excuse_letters')
                        .select('id')
                        .in('student_id', studentIds)
                        .eq('status', 'Pending');
                    
                    pendingCount = pendingExcuses?.length || 0;
                }

                // FIX 2: Get clinic visits for homeroom students OR students this teacher referred
                let clinicQuery = supabase.from('clinic_visits').select('id').eq('status', 'In Clinic').is('time_out', null);
                if (studentIds.length > 0) {
                    clinicQuery = clinicQuery.or(`student_id.in.(${studentIds.join(',')}),referred_by_teacher_id.eq.${currentUser.id}`);
                } else {
                    clinicQuery = clinicQuery.eq('referred_by_teacher_id', currentUser.id);
                }
                
                const { data: clinicVisits } = await clinicQuery;
                inClinic = clinicVisits?.length || 0;

                // Update the UI
                document.getElementById('stat-present').innerText = present;
                document.getElementById('stat-late').innerText = late;
                document.getElementById('stat-absent').innerText = absent;
                document.getElementById('stat-excused').innerText = excused;
                document.getElementById('stat-clinic').innerText = inClinic;
            } catch (err) {
                console.error('Error loading dashboard stats:', err);
            }
        }

        // ==========================================
        // REAL-TIME DASHBOARD ENGINE
        // ==========================================
        let dashboardChannel;
        
        function initDashboardRealtime() {
            if (dashboardChannel) supabase.removeChannel(dashboardChannel);
            
            dashboardChannel = supabase.channel('dashboard-live-wire')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'attendance_logs' }, () => {
                    console.log('Live update: Attendance changed');
                    loadAdviserDashboardStats(); // Silently updates counters
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'clinic_visits' }, () => {
                    console.log('Live update: Clinic pass issued/updated');
                    loadAdviserDashboardStats();
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'excuse_letters' }, () => {
                    console.log('Live update: New excuse letter submitted');
                    loadAdviserDashboardStats();
                })
                .subscribe();
        }
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setTimeout(initDashboardRealtime, 1500); // Start listening after initial load
        });
    </script>
