<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- FIX: Add missing scanner library -->
    <title>Gatekeeper Mode - Educare Teacher</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
     <script src="../assets/supabase-client.js"></script>
     <script src="../core/general-core.js"></script>
     <script src="../core/attendance-helpers.js"></script>
     <script src="teacher-core.js"></script>
     <script src="teacher-gatekeeper-mode.js" defer></script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        
        @keyframes scan-line {
            0%, 100% { top: 10%; }
            50% { top: 90%; }
        }
        .scan-line { animation: scan-line 2s ease-in-out infinite; }
        
        #qr-reader {
            border: none !important;
            border-radius: 1rem;
            overflow: hidden;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">
    
    <!-- Start Overlay for Camera/Audio Unlock -->
    <div id="start-overlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-50 flex flex-col items-center justify-center">
        <div class="w-24 h-24 bg-emerald-500 rounded-full flex items-center justify-center mb-6 shadow-2xl shadow-emerald-500/20 animate-pulse">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-black text-white mb-2">Scanner Inactive</h1>
        <p class="text-slate-400 mb-8 text-center px-4">Click the button below to start the camera and enable scanning.</p>
        <button id="start-scanner-btn" class="px-8 py-4 bg-emerald-500 text-white rounded-2xl font-bold uppercase tracking-widest shadow-lg shadow-emerald-500/30 transition-all hover:scale-105">
            Start Scanner
        </button>
    </div>
    
    <!-- Header -->
    <header class="bg-slate-900/90 backdrop-blur-xl border-b border-slate-700/50 p-3 sm:p-4">
        <div class="flex items-center justify-between max-w-2xl mx-auto">
            <div class="flex items-center gap-2 sm:gap-3">
                <button onclick="window.location.href='teacher-dashboard.html'" class="p-2 rounded-lg bg-slate-800 hover:bg-slate-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <div>
                    <h1 class="font-bold text-base sm:text-lg">Gatekeeper Mode</h1>
                    <p class="text-xs text-slate-400 hidden sm:block">Scan Student ID at Gate</p>
                </div>
            </div>
            <!-- UPDATED: Added teacher name display for Phase 1 -->
            <div class="text-right">
                <p id="teacher-name-display" class="font-medium text-blue-300 text-sm">Loading...</p>
                <p id="current-time" class="font-mono text-lg font-bold text-emerald-400">--:--:--</p>
                <p id="current-date" class="text-xs text-slate-400 hidden sm:block">Loading...</p>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center p-3 sm:p-4 gap-3 sm:gap-4 max-w-2xl mx-auto w-full">
        
        <!-- Scanner Container -->
        <div class="w-full relative px-2 sm:px-0">
            <div id="qr-reader" class="w-full aspect-square max-w-sm mx-auto bg-slate-800 rounded-2xl overflow-hidden shadow-2xl shadow-black/50"></div>
            
            <!-- Scanner Overlay -->
            <div class="absolute inset-0 pointer-events-none">
                <div class="absolute top-4 left-4 w-12 h-12 border-l-4 border-t-4 border-emerald-400 rounded-tl-lg"></div>
                <div class="absolute top-4 right-4 w-12 h-12 border-r-4 border-t-4 border-emerald-400 rounded-tr-lg"></div>
                <div class="absolute bottom-4 left-4 w-12 h-12 border-l-4 border-b-4 border-emerald-400 rounded-bl-lg"></div>
                <div class="absolute bottom-4 right-4 w-12 h-12 border-r-4 border-b-4 border-emerald-400 rounded-br-lg"></div>
                <div class="scan-line absolute left-8 right-8 h-1 bg-gradient-to-r from-transparent via-emerald-400 to-transparent"></div>
            </div>
        </div>
        
        <!-- Status Indicator -->
        <div id="status-indicator" class="w-full text-center py-3 px-4 rounded-xl bg-slate-800/80 border border-slate-700">
            <p class="text-sm text-slate-300">Ready to scan student ID</p>
        </div>
        
        <!-- Last Scan Result -->
        <div id="last-scan" class="w-full hidden">
            <div class="p-6 rounded-2xl bg-slate-800/80 border border-slate-700">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-sm text-slate-400">Last Scan</span>
                    <span id="scan-action" class="px-3 py-1 rounded-full text-xs font-bold uppercase">ENTRY</span>
                </div>
                <h2 id="scan-student-name" class="text-2xl font-bold mb-1">Student Name</h2>
                <p id="scan-grade-level" class="text-sm text-blue-400 font-bold mb-2">Grade Level</p>
                <p id="scan-status" class="text-lg font-medium">Status</p>
                <p id="scan-time" class="text-sm text-slate-400 mt-2">Time: --:--</p>
            </div>
        </div>
        
        <!-- Manual Entry Button -->
        <button onclick="showManualEntry()" class="w-full max-w-sm mx-auto py-3 sm:py-3 px-4 bg-slate-700 hover:bg-slate-600 rounded-xl font-medium transition-colors flex items-center justify-center gap-2 text-sm sm:text-base">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Manual Student ID Entry
        </button>
        
    </main>
    
    <!-- Manual Entry Modal -->
    <div id="manual-entry-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
            <div class="bg-gradient-to-r from-blue-600 to-blue-500 px-8 py-6 flex justify-between items-center text-white shrink-0">
                <h3 class="font-black text-xl uppercase tracking-tight">Manual Entry</h3>
                <button onclick="closeManualEntry()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all hover:rotate-90">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-8">
                <input type="text" id="manual-student-id" placeholder="Enter Student ID" class="w-full bg-gray-50 border-2 border-gray-200 rounded-xl px-4 py-3 text-gray-800 font-mono text-center text-lg focus:outline-none focus:border-blue-500 mb-6">
                <div class="flex gap-3">
                    <button onclick="closeManualEntry()" class="flex-1 py-3 bg-gray-100 hover:bg-gray-200 rounded-xl font-bold text-gray-600 transition-colors">Cancel</button>
                    <button onclick="submitManualEntry()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold text-white transition-colors">Submit</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Toast Notifications -->
    <!-- FIX: Add missing toast and audio elements -->
    <div id="toast-success" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-xl shadow-2xl transform transition-all duration-300 translate-y-24 opacity-0 flex items-center gap-3"></div>
    <div id="toast-error" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-xl shadow-2xl transform transition-all duration-300 translate-y-24 opacity-0 flex items-center gap-3"></div>
    
    <!-- Audio Elements - Placeholder for actual sound files -->
    <audio id="audio-success" src="../assets/sounds/success.mp3" preload="auto"></audio>
    <audio id="audio-error" src="../assets/sounds/error.mp3" preload="auto"></audio>
    <audio id="audio-late" src="../assets/sounds/alert.mp3" preload="auto"></audio>

</body>
</html>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
    });
</script>
