<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homeroom Attendance Table - Educare</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/supabase-client.js"></script>
    <script src="../core/general-core.js"></script>
    <script src="../core/school-year-core.js"></script>
    <script src="../core/attendance-utils.js"></script>
    <script src="teacher-core.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%); }
        .attendance-cell { width: 100%; transition: all 0.15s ease; cursor: pointer; }
        .attendance-cell:hover { transform: scale(0.96); filter: brightness(0.96); }
        .disabled-cell { cursor: not-allowed; opacity: 0.7; }
        .disabled-cell:hover { transform: none; filter: none; }
        .table-container { max-height: 65vh; overflow: auto; border-radius: 1.5rem; }
        .stat-badge { transition: all 0.2s; }
        .month-nav-btn { transition: all 0.2s; }
        .month-nav-btn:hover { background: #f1f5f9; transform: translateY(-2px); }
        .student-stats-cell { background: #f8fafc; font-weight: 600; text-align: center; border-right: 1px solid #e2e8f0; }
        .warning-banner { background: linear-gradient(90deg, #fef3c7, #ffedd5); border-left: 6px solid #f59e0b; }
    </style>
</head>
<body class="min-h-screen">
    <div class="bg-white/90 backdrop-blur-md sticky top-0 z-20 border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='teacher-dashboard.html'" class="p-2 rounded-xl hover:bg-gray-100 transition">
                    <i data-lucide="arrow-left" class="w-5 h-5 text-gray-600"></i>
                </button>
                <h1 class="text-2xl font-black bg-gradient-to-r from-blue-700 to-indigo-600 bg-clip-text text-transparent">Homeroom Attendance History</h1>
            </div>
            <div class="flex items-center gap-3">
                <span id="teacher-name" class="text-sm font-semibold text-gray-600">Loading...</span>
                <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold shadow-md">T</div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 mb-6 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <button id="prev-month" class="month-nav-btn p-2 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                <div class="text-lg font-bold text-gray-800 min-w-[180px] text-center" id="month-year-display">--</div>
                <button id="next-month" class="month-nav-btn p-2 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
            </div>
            <button id="save-attendance-btn" class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold shadow-md transition flex items-center gap-2">
                <i data-lucide="save" class="w-4 h-4"></i> Save All Changes
            </button>
            <button id="export-csv-btn" onclick="exportHomeroomAttendanceToCSV()" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-md transition flex items-center gap-2">
                <i data-lucide="download" class="w-4 h-4"></i> Export CSV
            </button>
        </div>

        <div id="absence-warning-banner" class="warning-banner hidden rounded-xl p-4 mb-6 flex items-center justify-between shadow-md">
            <div class="flex items-center gap-3">
                <i data-lucide="alert-triangle" class="w-6 h-6 text-amber-600"></i>
                <div>
                    <p class="font-bold text-amber-800">⚠️ Attendance Warning</p>
                    <p id="warning-message" class="text-sm text-amber-700">Some students have reached 15+ absences (DepEd dropout threshold).</p>
                </div>
            </div>
            <button onclick="document.getElementById('absence-warning-banner').classList.add('hidden')" class="text-amber-600 hover:text-amber-800">✕</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-6 gap-5 mb-8">
            <div class="bg-white rounded-2xl border-l-8 border-green-500 shadow-sm p-4 flex justify-between items-center">
                <div><p class="text-xs text-gray-400 font-bold uppercase">Present (Month)</p><p id="stat-present" class="text-3xl font-black text-gray-800">0</p></div>
                <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center"><i data-lucide="check-circle" class="w-6 h-6 text-green-600"></i></div>
            </div>
            <div class="bg-white rounded-2xl border-l-8 border-orange-500 shadow-sm p-4 flex justify-between items-center">
                <div><p class="text-xs text-gray-400 font-bold uppercase">Late (Month)</p><p id="stat-late" class="text-3xl font-black text-gray-800">0</p></div>
                <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center"><i data-lucide="clock" class="w-6 h-6 text-orange-600"></i></div>
            </div>
            <div class="bg-white rounded-2xl border-l-8 border-red-500 shadow-sm p-4 flex justify-between items-center">
                <div><p class="text-xs text-gray-400 font-bold uppercase">Absent (Month)</p><p id="stat-absent" class="text-3xl font-black text-gray-800">0</p></div>
                <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center"><i data-lucide="x-circle" class="w-6 h-6 text-red-600"></i></div>
            </div>
            <div class="bg-white rounded-2xl border-l-8 border-amber-500 shadow-sm p-4 flex justify-between items-center">
                <div><p class="text-xs text-gray-400 font-bold uppercase">Half-Day (Month)</p><p id="stat-halfday" class="text-3xl font-black text-gray-800">0</p></div>
                <div class="w-12 h-12 bg-amber-100 rounded-xl flex items-center justify-center"><i data-lucide="minus-circle" class="w-6 h-6 text-amber-600"></i></div>
            </div>
            <div class="bg-white rounded-2xl border-l-8 border-blue-500 shadow-sm p-4 flex justify-between items-center">
                <div><p class="text-xs text-gray-400 font-bold uppercase">Excused (Month)</p><p id="stat-excused" class="text-3xl font-black text-gray-800">0</p></div>
                <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center"><i data-lucide="file-text" class="w-6 h-6 text-blue-600"></i></div>
            </div>
            <div class="bg-white rounded-2xl border-l-8 border-purple-500 shadow-sm p-4 flex justify-between items-center">
                <div><p class="text-xs text-gray-400 font-bold uppercase">YTD Absences (Avg)</p><p id="stat-ytd-avg" class="text-3xl font-black text-gray-800">0</p></div>
                <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center"><i data-lucide="trending-up" class="w-6 h-6 text-purple-600"></i></div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden">
            <div class="table-container overflow-x-auto">
                <table class="min-w-full">
                    <thead id="table-header" class="bg-gray-50 border-b-2 border-gray-200 sticky top-0 z-10"></thead>
                    <tbody id="table-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="teacher-homeroom-table.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
    </script>
</body>
</html>
