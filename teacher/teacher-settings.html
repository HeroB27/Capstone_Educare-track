<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Teacher Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../assets/supabase-client.js"></script>
    <script src="../core/general-core.js"></script>
    <script src="teacher-core.js" defer></script>
    <script src="teacher-settings.js" defer></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .nav-item { transition: all 200ms ease-out; }
        .nav-item:hover { transform: translateX(4px); }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-blue-50 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 m-4 rounded-[32px] bg-blue-900 text-white flex flex-col shadow-2xl shrink-0">
        <div class="p-8 flex items-center gap-3 border-b border-white/10">
            <div class="bg-white/10 p-2 rounded-xl"><i data-lucide="graduation-cap" class="w-6 h-6 text-blue-300"></i></div>
            <span class="text-2xl font-black tracking-tighter uppercase">TEACHER</span>
        </div>
        <nav class="flex-1 py-6 px-4 space-y-1.5">
            <a href="teacher-dashboard.html" class="flex items-center gap-3 px-4 py-3 text-blue-200 hover:bg-white/5 rounded-xl transition-all">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="teacher-homeroomlist.html" class="flex items-center gap-3 px-4 py-3 text-blue-200 hover:bg-white/5 rounded-xl transition-all">
                <i data-lucide="users" class="w-5 h-5"></i> Homeroom Class
            </a>
            <a href="teacher-subject-attendance.html" class="flex items-center gap-3 px-4 py-3 text-blue-200 hover:bg-white/5 rounded-xl transition-all">
                <i data-lucide="book-open" class="w-5 h-5"></i> Subject Attendance
            </a>
            <a href="teacher-clinicpass.html" class="flex items-center gap-3 px-4 py-3 text-blue-200 hover:bg-white/5 rounded-xl transition-all">
                <i data-lucide="heart-pulse" class="w-5 h-5"></i> Clinic Pass
            </a>
            <a href="teacher-excuse-letter-approval.html" class="flex items-center gap-3 px-4 py-3 text-blue-200 hover:bg-white/5 rounded-xl transition-all">
                <i data-lucide="file-text" class="w-5 h-5"></i> Excuse Letters
            </a>
            <a href="teacher-data-analytics.html" class="flex items-center gap-3 px-4 py-3 text-blue-200 hover:bg-white/5 rounded-xl transition-all">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Analytics
            </a>
            <a href="teacher-announcements-board.html" class="flex items-center gap-3 px-4 py-3 text-blue-200 hover:bg-white/5 rounded-xl transition-all">
                <i data-lucide="megaphone" class="w-5 h-5"></i> Announcements
            </a>
            <a href="teacher-gatekeeper-mode.html" class="flex items-center gap-3 px-4 py-3 text-blue-200 hover:bg-white/5 rounded-xl transition-all">
                <i data-lucide="scan-line" class="w-5 h-5"></i> Gatekeeper Mode
            </a>
            <a href="teacher-settings.html" class="flex items-center gap-3 px-4 py-3 bg-blue-800/50 border-l-4 border-white text-white rounded-r-xl font-bold transition-all">
                <i data-lucide="settings" class="w-5 h-5"></i> Settings
            </a>
        </nav>
        <div class="p-4 border-t border-blue-800/50">
            <button onclick="logout()" class="flex items-center justify-center gap-2 w-full py-3 bg-red-600 hover:bg-red-500 rounded-2xl transition-all duration-200 hover:shadow-lg shadow-red-500/30">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                <span class="font-medium">Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-[80px] bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-10 shrink-0">
            <h2 class="text-3xl font-black text-gray-900 tracking-tight" id="page-title">Account Settings</h2>
            <div class="flex items-center gap-4">
                <span id="teacher-name" class="font-medium text-gray-600">Loading...</span>
                <div class="h-12 w-12 bg-gradient-to-br from-blue-400 to-blue-600 rounded-2xl flex items-center justify-center text-white font-bold shadow-lg shadow-blue-500/30" id="user-avatar">T</div>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-8" id="main-content">
            <div class="max-w-2xl mx-auto" id="settings-container">
                <!-- Settings UI will be injected here by teacher-core.js -->
            </div>
        </div>
    </main>

</body>
</html>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
    });
</script>
