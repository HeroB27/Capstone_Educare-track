<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - Educare Guard</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="../assets/supabase-client.js"></script>
    <script src="../core/general-core.js"></script>
    <script src="guard-core.js"></script>
    <script src="guard-announcements-board.js" defer></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        
        /* Mobile sidebar animation */
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }
        .animate-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-yellow-50 via-white to-yellow-50 min-h-screen flex text-gray-800">

    <!-- Mobile Header with Hamburger Menu -->
    <header class="lg:hidden fixed top-0 left-0 right-0 bg-yellow-900 text-white z-50 px-4 py-3 flex items-center justify-between shadow-lg">
        <button onclick="toggleMobileSidebar()" class="p-2 hover:bg-yellow-800 rounded-lg transition-colors">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
        <div class="flex items-center gap-2">
            <i data-lucide="shield" class="w-5 h-5 text-yellow-300"></i>
            <span class="font-black">GUARD</span>
        </div>
        <div class="w-10"></div>
    </header>

    <!-- Mobile Sidebar Overlay -->
    <div id="mobile-sidebar" class="lg:hidden fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleMobileSidebar()">
        <aside class="w-64 m-2 rounded-3xl bg-yellow-900 text-white flex flex-col animate-slide-in" onclick="event.stopPropagation()">
            <div class="p-6 flex items-center justify-between border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div class="bg-white/10 p-2 rounded-xl"><i data-lucide="shield" class="w-6 h-6 text-yellow-300"></i></div>
                    <span class="text-xl font-black">GUARD</span>
                </div>
                <button onclick="toggleMobileSidebar()" class="p-2 hover:bg-white/10 rounded-lg">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <nav class="flex-1 py-4 px-4 space-y-1">
                <a href="guard-dashboard.html" onclick="toggleMobileSidebar()" class="flex items-center gap-3 px-4 py-3 text-yellow-200 hover:bg-white/5 rounded-xl">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="scanner.html" onclick="toggleMobileSidebar()" class="flex items-center gap-3 px-4 py-3 text-yellow-200 hover:bg-white/5 rounded-xl">
                    <i data-lucide="scan-line" class="w-5 h-5"></i> Scanner
                </a>
                <a href="guard-basic-analytics.html" onclick="toggleMobileSidebar()" class="flex items-center gap-3 px-4 py-3 text-yellow-200 hover:bg-white/5 rounded-xl">
                    <i data-lucide="bar-chart-2" class="w-5 h-5"></i> Analytics
                </a>
                <a href="guard-announcements-board.html" onclick="toggleMobileSidebar()" class="flex items-center gap-3 px-4 py-3 bg-yellow-800/50 border-l-4 border-white text-white rounded-r-xl font-bold">
                    <i data-lucide="megaphone" class="w-5 h-5"></i> Announcements
                </a>
                <a href="guard-system-settings.html" onclick="toggleMobileSidebar()" class="flex items-center gap-3 px-4 py-3 text-yellow-200 hover:bg-white/5 rounded-xl">
                    <i data-lucide="settings" class="w-5 h-5"></i> Settings
                </a>
            </nav>
            
            <div class="p-4 border-t border-white/10">
                <button onclick="logout()" class="flex items-center gap-3 px-4 py-3 w-full text-yellow-200 hover:bg-white/5 rounded-xl">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Logout
                </button>
            </div>
        </aside>
    </div>

    <!-- Mobile Toggle Script -->
    <script>
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('mobile-sidebar');
            sidebar.classList.toggle('hidden');
        }
    </script>

    <!-- Main Content -->
    <main class="flex-1 p-4 lg:p-6 overflow-y-auto custom-scrollbar pt-20 lg:pt-6">
        
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md rounded-3xl px-8 py-4 mb-6 flex items-center justify-between border border-yellow-100/50 shadow-sm">
            <div>
                <h1 class="text-2xl font-black text-gray-900">Announcements</h1>
                <p class="text-sm text-gray-500 font-medium">School-wide updates and notices</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="current-date" class="text-xl font-bold text-gray-800">--</p>
                    <p id="current-day" class="text-xs text-gray-500">Loading...</p>
                </div>
                <div class="w-12 h-12 bg-yellow-100 rounded-2xl flex items-center justify-center">
                    <i data-lucide="calendar" class="w-6 h-6 text-yellow-600"></i>
                </div>
            </div>
        </header>

        <!-- Filter Tabs -->
        <div class="flex gap-2 mb-6">
            <button onclick="filterAnnouncements('all')" class="px-5 py-2.5 bg-white border-2 border-gray-200 rounded-xl text-sm font-bold text-yellow-600 shadow-sm transition-all duration-200" id="tab-all">
                All
            </button>
            <button onclick="filterAnnouncements('important')" class="px-5 py-2.5 text-sm font-bold text-gray-500 hover:text-gray-900 transition-all duration-200" id="tab-important">
                Important
            </button>
            <button onclick="filterAnnouncements('events')" class="px-5 py-2.5 text-sm font-bold text-gray-500 hover:text-gray-900 transition-all duration-200" id="tab-events">
                Events
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-10 pb-8 custom-scrollbar">
            <!-- Announcements Grid -->
            <div id="announcements-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full p-12 text-center text-gray-500">
                    <i data-lucide="megaphone" class="w-16 h-16 mx-auto text-gray-300 mb-4"></i>
                    <p class="font-medium">Loading announcements...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Announcement Detail Modal -->
    <div id="announcement-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="bg-gradient-to-r from-amber-600 to-amber-500 px-8 py-6 flex justify-between items-center text-white shrink-0">
                <h3 id="modal-title" class="font-black text-xl uppercase tracking-tight">Announcement Details</h3>
                <button onclick="closeAnnouncementModal()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all hover:rotate-90">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="modal-content" class="p-8 overflow-y-auto custom-scrollbar flex-1">
            </div>
        </div>
    </div>

    <script>
        // Set current date
        const now = new Date();
        document.getElementById('current-date').innerText = now.toLocaleDateString('en-US', { day: 'numeric', month: 'short' });
        document.getElementById('current-day').innerText = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        
        // Session check
        const user = checkSession('guards');
        if (user) {
            document.getElementById('guard-name').innerText = user.full_name;
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
