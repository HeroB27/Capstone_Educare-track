<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner - Educare Guard</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Core Scripts -->
    <script src="../assets/supabase-client.js"></script>
    <script src="../core/general-core.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        #reader { border: none !important; }
        #reader__dashboard_section_swaplink { display: none !important; }
        #reader__dashboard_section_csr span { display: none !important; }
        .scan-line { animation: scan-line 2s ease-in-out infinite; }
        @keyframes scan-line { 0%, 100% { top: 10%; } 50% { top: 90%; } }
    </style>
</head>
<body class="text-white">

    <!-- FIX: "Start Scanner" overlay to unlock AudioContext -->
    <div id="start-overlay" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center">
        <div class="w-24 h-24 bg-yellow-500 rounded-full flex items-center justify-center mb-6 shadow-2xl shadow-yellow-500/20">
            <i data-lucide="scan-line" class="w-12 h-12 text-white"></i>
        </div>
        <h1 class="text-3xl font-black mb-2">Scanner Inactive</h1>
        <p class="text-slate-400 mb-8">Click the button to initialize the scanner and audio.</p>
        <button onclick="startScanningProcess()" class="px-10 py-4 bg-yellow-500 text-white rounded-2xl font-bold uppercase tracking-widest shadow-lg shadow-yellow-500/30 transition-all hover:scale-105">
            Start Scanner
        </button>
    </div>

    <!-- Main Scanner Interface -->
    <div class="min-h-screen flex flex-col lg:flex-row">
        <!-- Left Panel: Scanner & Result -->
        <div class="flex-1 lg:w-2/3 bg-slate-900 flex flex-col items-center justify-center p-4 sm:p-8">
            <div class="w-full max-w-lg relative px-2 sm:px-0">
                <!-- Camera Scanner -->
                <div id="reader" class="w-full max-w-sm mx-auto aspect-square overflow-hidden rounded-3xl bg-black shadow-2xl shadow-black/50"></div>
                
                <!-- Scanner Overlay -->
                <div class="absolute inset-0 pointer-events-none">
                    <div class="absolute top-4 left-4 w-12 h-12 border-l-4 border-t-4 border-yellow-400 rounded-tl-lg"></div>
                    <div class="absolute top-4 right-4 w-12 h-12 border-r-4 border-t-4 border-yellow-400 rounded-tr-lg"></div>
                    <div class="absolute bottom-4 left-4 w-12 h-12 border-l-4 border-b-4 border-yellow-400 rounded-bl-lg"></div>
                    <div class="absolute bottom-4 right-4 w-12 h-12 border-r-4 border-b-4 border-yellow-400 rounded-br-lg"></div>
                    <div class="scan-line absolute left-8 right-8 h-1 bg-gradient-to-r from-transparent via-yellow-400 to-transparent"></div>
                </div>
            </div>

            <!-- Hidden input for USB HID Scanners -->
            <input type="text" id="usb-scanner-input" class="opacity-0 w-0 h-0 absolute">
            
            <!-- Scanner Focus Indicator -->
            <div id="scanner-focus-indicator" class="hidden fixed top-4 right-4 px-3 py-1 bg-green-500 text-white text-xs font-bold rounded-full">
                Scanner Active
            </div>
            
            <!-- Manual Entry Fallback -->
            <div class="w-full max-w-lg mt-4">
                <button type="button" onclick="toggleManualEntry()" class="text-sm text-yellow-400 hover:text-yellow-300 underline">
                    Or enter ID manually
                </button>
                <div id="manual-entry-section" class="hidden mt-2 flex gap-2">
                    <input type="text" id="manual-student-id" placeholder="Enter Student ID" 
                        class="flex-1 px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400">
                    <button type="button" onclick="submitManualEntry()" 
                        class="px-4 py-2 bg-yellow-500 text-slate-900 font-bold rounded-lg hover:bg-yellow-400">
                        Submit
                    </button>
                </div>
            </div>

            <!-- Scan Result Display -->
            <div id="scan-result" class="hidden w-full max-w-lg mt-8 p-6 bg-slate-800 rounded-3xl border border-slate-700">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-gray-600 rounded-2xl overflow-hidden flex-shrink-0 relative">
                        <img id="student-img" src="" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 id="student-name" class="text-xl font-bold truncate">Student Name</h3>
                        <p id="student-info" class="text-sm text-slate-400">Grade & Section</p>
                    </div>
                    <div id="status-badge" class="px-4 py-2 rounded-lg text-lg font-bold text-white">
                        <!-- Status injected by JS -->
                    </div>
                </div>
            </div>
            <div id="scan-placeholder" class="w-full max-w-lg mt-8 p-6 text-center text-slate-500">
                <p>Scan a student ID to begin...</p>
            </div>
            
            <!-- Gate Status Indicator -->
            <div id="status-indicator" class="w-full max-w-lg mt-4 text-center">
                <span class="inline-block bg-green-100 text-green-700 px-4 py-2 rounded-full text-sm font-bold">GATE ACTIVE</span>
            </div>
        </div>

        <!-- Right Panel: Info & Recent Scans -->
        <div class="lg:w-1/3 bg-slate-800 p-4 sm:p-8 flex flex-col border-l border-slate-700">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-black">Guard Terminal</h2>
                    <p id="guard-name" class="text-sm text-yellow-400 font-bold">Loading...</p>
                </div>
                <a href="guard-dashboard.html" class="px-4 py-2 bg-slate-700 text-white rounded-xl text-sm font-bold hover:bg-slate-600 transition-colors">Dashboard</a>
            </div>

            <!-- Loading/Error Indicators -->
            <div id="loading-indicator" class="hidden p-4 bg-blue-900/50 text-blue-300 rounded-lg mb-4 text-center">Loading...</div>
            <div id="error-message" class="hidden p-4 bg-red-900/50 text-red-300 rounded-lg mb-4"></div>
            <div id="warning-message" class="hidden p-4 bg-yellow-900/50 text-yellow-300 rounded-lg mb-4"></div>

            <h3 class="font-bold text-lg mb-4">Recent Scans</h3>
            <div id="recent-scans-list" class="flex-1 space-y-2 overflow-y-auto">
                <p class="text-slate-500 text-center py-10">No scans yet.</p>
            </div>
        </div>
    </div>

    <!-- Guard Core Script -->
    <script src="guard-core.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            // Manual entry toggle function
            window.toggleManualEntry = function() {
                const section = document.getElementById('manual-entry-section');
                section.classList.toggle('hidden');
                if (!section.classList.contains('hidden')) {
                    document.getElementById('manual-student-id').focus();
                }
            };
            
            // Submit manual entry
            window.submitManualEntry = function() {
                const input = document.getElementById('manual-student-id');
                const studentId = input.value.trim();
                if (studentId && typeof onScanSuccess === 'function') {
                    onScanSuccess(studentId);
                    input.value = '';
                    document.getElementById('manual-entry-section').classList.add('hidden');
                }
            };
            
            // Enter key support for manual entry
            document.getElementById('manual-student-id')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitManualEntry();
            });
            
            // Scanner focus indicator - show when input is focused
            const usbInput = document.getElementById('usb-scanner-input');
            const focusIndicator = document.getElementById('scanner-focus-indicator');
            if (usbInput && focusIndicator) {
                usbInput.addEventListener('focus', () => focusIndicator.classList.remove('hidden'));
                usbInput.addEventListener('blur', () => focusIndicator.classList.add('hidden'));
            }
        });
    </script>
</body>
</html>
