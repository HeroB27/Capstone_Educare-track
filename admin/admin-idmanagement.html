<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Management - Educare Admin</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../assets/supabase-client.js"></script>
    <script src="../core/general-core.js"></script>
    <script src="admin-core.js" defer></script>
    <script src="admin-idmanagement.js" defer></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gradient-to-br from-violet-50 via-white to-violet-50 min-h-screen flex text-gray-800">

    <!-- Sidebar Navigation -->
    <aside class="w-64 m-4 rounded-3xl bg-violet-900 text-white flex flex-col shadow-2xl shrink-0">
        <div class="p-8 flex items-center gap-3 border-b border-white/10">
            <div class="bg-white/10 p-2 rounded-xl"><i data-lucide="graduation-cap" class="w-6 h-6 text-violet-300"></i></div>
            <span class="text-2xl font-black tracking-tighter">EDUCARE</span>
        </div>
        <nav class="flex-1 py-6 px-4 space-y-1.5 overflow-y-auto">
            <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-3 text-violet-200 hover:bg-white/5 rounded-xl transition-all font-bold">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="admin-user-management.html" class="flex items-center gap-3 px-4 py-3 text-violet-200 hover:bg-white/5 rounded-xl transition-all font-bold">
                <i data-lucide="users" class="w-5 h-5"></i> User Management
            </a>
            <a href="admin-class-management.html" class="flex items-center gap-3 px-4 py-3 text-violet-200 hover:bg-white/5 rounded-xl transition-all font-bold">
                <i data-lucide="book-open" class="w-5 h-5"></i> Class Management
            </a>
            <a href="admin-data-analytics.html" class="flex items-center gap-3 px-4 py-3 text-violet-200 hover:bg-white/5 rounded-xl transition-all font-bold">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Data Analytics
            </a>
            <a href="admin-announcements.html" class="flex items-center gap-3 px-4 py-3 text-violet-200 hover:bg-white/5 rounded-xl transition-all font-bold">
                <i data-lucide="megaphone" class="w-5 h-5"></i> Announcements
            </a>
            <a href="admin-settings.html" class="flex items-center gap-3 px-4 py-3 text-violet-200 hover:bg-white/5 rounded-xl transition-all font-bold">
                <i data-lucide="settings" class="w-5 h-5"></i> Settings Hub
            </a>
            <a href="admin-grade-schedules.html" class="flex items-center gap-3 px-4 py-3 text-violet-200 hover:bg-white/5 rounded-xl transition-all font-bold">
                <i data-lucide="users-round" class="w-5 h-5"></i> Grade Schedules
            </a>
            <a href="admin-calendar.html" class="flex items-center gap-3 px-4 py-3 text-violet-200 hover:bg-white/5 rounded-xl transition-all font-bold">
                <i data-lucide="calendar" class="w-5 h-5"></i> School Calendar
            </a>
            <div class="pt-4 border-t border-white/10 mt-4">
                <a href="admin-idmanagement.html" class="flex items-center gap-3 px-4 py-3 bg-violet-800/50 border-l-4 border-white text-white rounded-r-xl font-bold transition-all">
                    <i data-lucide="id-card" class="w-5 h-5"></i> ID Management
                </a>
                <a href="admin-idtemplate.html" class="flex items-center gap-3 px-4 py-3 text-violet-200 hover:bg-white/5 rounded-xl transition-all font-bold">
                    <i data-lucide="palette" class="w-5 h-5"></i> ID Template
                </a>
            </div>
        </nav>
        <div class="p-6 border-t border-white/10">
            <button onclick="logout()" class="flex items-center gap-3 px-4 py-3 w-full text-red-300 hover:bg-red-500/10 rounded-xl transition-all font-bold">
                <i data-lucide="log-out" class="w-5 h-5"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-[80px] bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-10 shrink-0">
            <div class="flex items-center gap-6">
                <h2 class="text-3xl font-black text-gray-900 tracking-tight">ID Management</h2>
                <span id="studentCount" class="px-4 py-1.5 bg-violet-100 text-violet-700 rounded-full text-sm font-bold"></span>
            </div>
            <div class="flex items-center gap-6">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="text" id="searchInput" oninput="filterStudents()" placeholder="Search student name or ID..." 
                        class="pl-12 pr-6 py-3 bg-gray-50 border-2 border-gray-100 rounded-2xl font-bold text-sm outline-none focus:border-violet-200 w-80 transition-all">
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-10">
            <!-- Pagination Controls - Above Table -->
            <div id="paginationControls" class="mb-6 flex items-center justify-center gap-4" style="display: flex !important;">
                <button onclick="prevPage()" class="px-6 py-3 bg-violet-100 text-violet-700 rounded-2xl font-bold hover:bg-violet-200 transition-all">
                    <i data-lucide="chevron-left" class="w-5 h-5 inline"></i> Prev
                </button>
                <span id="pageIndicator" class="px-6 py-3 bg-violet-600 text-white rounded-2xl font-bold">Page 1</span>
                <button onclick="nextPage()" class="px-6 py-3 bg-violet-100 text-violet-700 rounded-2xl font-bold hover:bg-violet-200 transition-all">
                    Next <i data-lucide="chevron-right" class="w-5 h-5 inline"></i>
                </button>
            </div>
            
            <!-- Student ID Table -->
            <div id="idTableContainer" class="bg-white rounded-[32px] shadow-sm border border-gray-100 overflow-hidden mb-8" style="display: block !important;">
                <table class="w-full text-left">
                    <thead class="bg-gray-50/50 border-b">
                        <tr>
                            <th class="px-8 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Student Details</th>
                            <th class="px-8 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Class & Dept</th>
                            <th class="px-8 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Parent / Contact</th>
                            <th class="px-8 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="idListBody" class="divide-y divide-gray-50">
                        <!-- Table rows will be rendered by JavaScript -->
                    </tbody>
                </table>
            </div>
            
            <!-- Empty State -->
            <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20">
                <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-6">
                    <i data-lucide="search" class="w-12 h-12 text-gray-300"></i>
                </div>
                <h3 class="text-xl font-black text-gray-800 mb-2">No Students Found</h3>
                <p class="text-gray-500 font-medium">Try adjusting your search terms</p>
            </div>
        </div>
    </main>

    <!-- View ID Drawer (Right Side Slide-Out) -->
    <div id="viewIdDrawer" class="fixed top-0 right-0 w-full max-w-2xl h-full bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50">
        <div class="bg-gradient-to-r from-violet-900 to-indigo-800 px-6 py-5 flex justify-between items-center text-white shrink-0">
            <h3 class="font-black text-lg uppercase tracking-tight">Student ID Preview</h3>
            <button onclick="closeViewIdDrawer()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all hover:rotate-90">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <div class="p-6 overflow-y-auto custom-scrollbar flex-1 h-[calc(100%-140px)]">
            <div id="idPreviewContainer" class="flex gap-6 justify-center items-start flex-wrap">
                <!-- ID preview will be rendered here -->
            </div>
        </div>
        <div class="px-6 py-5 bg-gray-50 border-t flex justify-end gap-4 shrink-0">
            <button onclick="printCurrentID()" class="px-6 py-3 bg-violet-600 text-white rounded-2xl font-bold transition-all hover:bg-violet-700">
                <i data-lucide="printer" class="w-4 h-4 inline mr-2"></i> Print
            </button>
            <button onclick="closeViewIdDrawer()" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-2xl font-bold transition-all hover:bg-gray-200">Close</button>
        </div>
    </div>

    <!-- Print Queue Container (Hidden) -->
    <div id="id-print-queue" class="hidden"></div>
</body>
</html>
